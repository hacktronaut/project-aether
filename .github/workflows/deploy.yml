name: Deploy Playground to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build packages in dependency order
        run: |
          # 1. Build @aether/kdl first (no internal dependencies)
          npm run build --workspace=@aether/kdl

          # 2. Build @aether/core (depends on @aether/kdl)
          npm run build --workspace=@aether/core

          # 3. Build @aether/adapters and @aether/cli (both depend on @aether/core)
          npm run build --workspace=@aether/adapters
          npm run build --workspace=@aether/cli

          # 4. Compile knowledge graph using built CLI
          node packages/cli/dist/index.js compile packages/playground/knowledge -o packages/playground/public/graph.json

          # 5. Build the static playground
          npm run build --workspace=@aether/playground

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './packages/playground/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
